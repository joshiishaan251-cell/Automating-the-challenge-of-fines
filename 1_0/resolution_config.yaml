  FolderPathChecksASM: 'C:\Users\Logik\Documents\ИП Коротаев ОА\АМ ЧЕКИ АС МОСКВЫ ИП КОРОТАЕВ ОА'
  FolderPathChecksLKRTITS: 'C:\Users\Logik\Documents\ИП Коротаев ОА\АМ ЛК РТИС ИП КОРОТАЕВ ОА'
  FolderPathChecksRTITS: 'C:\Users\Logik\Documents\ИП Коротаев ОА\АМ ЧЕКИ РТИТС КОРОТАЕВ ОА'
  FolderPathOSAGO: 'C:\Users\Logik\Documents\ИП Коротаев ОА\АМ ОСАГО ИП КОРОТАЕВ ОА'
  FolderPathEGRUL: 'C:\Users\Logik\Documents\ИП Коротаев ОА\АМ ЕГРЮЛ КОРОТАЕВ ОА'
