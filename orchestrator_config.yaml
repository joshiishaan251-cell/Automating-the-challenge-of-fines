# --- ORCHESTRATOR CONFIGURATION ---
# This file centralizes management of all LegalTech modules.

modules:
  sorter:
    path: "SORTER/universal_sorter.py"
    config: "SORTER/config.yaml"
    description: "Universal document sorting into archive"
  
  payments:
    path: "SORTER_PP/sort_payments.py"
    description: "Specialized payment sorting"
    # No external config currently used by this script directly, but can be added here
  
  index_uin:
    path: "INDEX_UIN/index_uin.py"
    working_dir: "."
    description: "UIN Indexer (Scans ZIP/RAR archives)"
    
  "1_0":
    path: "1_0/process_resolutions.py"
    working_dir: "1_0"
    description: "Resolution processing (recognizing UIN, date, veh)"

logging:
  level: "INFO"
  file: "logs/orchestrator.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
