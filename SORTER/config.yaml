# --- КОНФИГУРАЦИЯ UNIVERSAL SORTER (OPTIMIZED) ---

# 1. ОТКУДА БЕРЕМ ФАЙЛЫ
# Папка, в которую ты сваливаешь новые документы для разбора
source_root: "C:\\Users\\Logik\\Downloads\\платежи штрафы 21112024"

# 2. ГДЕ ИЩЕМ ДЕЛА (АРХИВ)
# Список корневых папок. Скрипт просканирует их глубину и построит карту.
archive_paths:
  - "C:\\Users\\Logik\\Documents\\ИП Коротаев ОА\\Архив Штрафы ИП КОА\\1 ИЛ"
  - "C:\\Users\\Logik\\Documents\\ИП Коротаев ОА\\Архив Штрафы ИП КОА"
  - "C:\\Users\\Logik\\Documents\\ИП Коротаев ОА\\Архив ОТКАЗЫ Штрафы\\А Повтор"

# 3. ИНСТРУМЕНТЫ (ДВИЖОК)
# Пути к внешним программам. Без них магии не будет.
poppler_path: "C:\\poppler\\Library\\bin\\pdftotext.exe"
tesseract_path: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"

# 4. БЕЗОПАСНОСТЬ
# true  = РЕЖИМ СИМУЛЯЦИИ. Файлы остаются на месте, создается только CSV-отчет.
# false = БОЕВОЙ РЕЖИМ. Файлы перемещаются и переименовываются.
# РЕКОМЕНДАЦИЯ: Первый запуск делай с true!
dry_run: false

# 5. НАСТРОЙКИ ОТЧЕТА
csv_encoding: "cp1251" # Чтобы Excel нормально читал кириллицу было csv_encoding: "utf-8-sig" 
csv_delimiter: ";"         # Разделитель столбцов 

# 6. НАСТРОЙКИ КЭША (УСКОРЕНИЕ)
# Имя файла, куда сохраняется карта архива
cache_file: "archive_cache.json"
# Время жизни кэша в часах. 
# Если ты добавил в архив НОВУЮ папку руками, удали файл archive_cache.json, чтобы скрипт его пересоздал.
cache_ttl_hours: 24

# 7. НАСТРОЙКИ СТРУКТУРЫ И ИМЕНОВАНИЯ
# В какую подпапку внутри дела класть найденные файлы
target_subfolder: "3 Заявление"

# Префикс для поиска файла-якоря (образца имени) Если ты когда-нибудь захочешь убрать префикс и оставишь в конфиге пустоту "", файл начнется с пробела  А40.... Это не ошибка сейчас, но имей в виду на будущее: если будешь менять префикс, пробел в коде останется.
anchor_prefix: "! Взыскано"

# Суффикс, который добавляется к имени файла
anchor_suffix: "_печать"

# 8. РЕЖИМ ОТОБРАЖЕНИЯ (СКОРОСТЬ)
# true  = МЕДЛЕННО. Выводит таблицу в консоль (красиво, но тормозит).
# false = БЫСТРО. Показывает только прогресс-бар (максимальная скорость).
verbose: false

