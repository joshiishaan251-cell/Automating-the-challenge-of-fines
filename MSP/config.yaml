# =========================================================
# Конфигурация скрипта process_statement.py
# АО "МСП Банк" — Автоматизация банковской выписки
# =========================================================

# ---------------------------------------------------------
# 1. ПЕРИОД ФОРМИРОВАНИЯ БАНКОВСКОЙ ВЫПИСКИ
# ---------------------------------------------------------
statement_period:
  date_from: "02.12.2025"   # Дата начала периода (ДД.ММ.ГГГГ)
  date_to:   "03.03.2026"   # Дата окончания периода (ДД.ММ.ГГГГ)

# ---------------------------------------------------------
# 2. ФАЙЛЫ
# ---------------------------------------------------------
files:
  input_pdf:  "report (7).pdf"  # Исходный PDF-файл выписки
  output_pdf: "report_100x_reduced.pdf"              # Итоговый PDF после пересчёта

# ---------------------------------------------------------
# 3. ПАРАМЕТРЫ ПЕРЕСЧЁТА
# ---------------------------------------------------------
scaling:
  divider: 100                        # Делитель для масштабирования сумм
  incoming_balance: 69119.50          # Входящий остаток (оригинальное значение, до деления)

# ---------------------------------------------------------
# 4. ИСКЛЮЧЕНИЯ — БАНКОВСКИЕ КОМИССИИ (РАСХОД / ДЕБЕТ)
#
# Эти строки являются расходами (дебет).
# Суммы остаются НЕИЗМЕННЫМИ — не делятся на делитель.
# Также НЕ получают никаких добавок от перераспределения.
#
# Каждое правило определяется двумя якорями:
#   - payer:  подстрока в «Назначение платежа» (регистр не важен)
#   - amount: точная сумма в рублях (null = любая сумма)
# ---------------------------------------------------------
commission_exceptions:
  - payer:  "комиссия"
    amount: null

  - payer:  "осуществление переводов"
    amount: null

  - payer:  "комиссия за выдачу"
    amount: null

  - payer:  "государственная пошлина"
    amount: null

  # Добавляйте другие исключения по аналогии (не делятся на 100, без добавок):
  # - payer:  "комиссия за ведение счета"
  #   amount: null

# ---------------------------------------------------------
# 5. ЗАЩИЩЁННЫЕ ПРИХОДЫ (КРЕДИТ)
#
# Эти строки являются приходами (кредит).
# Суммы остаются НЕИЗМЕННЫМИ — не делятся на делитель.
# Образовавшийся «излишек» автоматически распределяется
# РАВНОМЕРНО по всем последующим дебетовым строкам
# (за исключением строк-комиссий из раздела выше),
# чтобы Исходящий остаток пассив остался неизменным.
#
# Каждый приход определяется двумя якорями:
#   - payer:  подстрока в «Назначение платежа» (регистр не важен)
#   - amount: точная сумма в рублях (null = любая сумма)
# ---------------------------------------------------------
protected_income:
  - payer:  "СОЮЗ-ЛОГИСТИК"
    amount: 20000.00

  - payer:  "СОЮЗ-ЛОГИСТИК"
    amount: 30000.00

  # Добавляйте другие защищённые приходы по аналогии:
  # - payer:  "ООО Ромашка"
  #   amount: 150000.00
  # Пример — добавьте защищённые приходы по аналогии:
 #- payer:  "СОЮЗЛОГИСТИК"
 # amount: null
